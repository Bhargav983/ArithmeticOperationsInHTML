<h1>Here we will perform multiplication</h1><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Multiplication Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            padding: 20px;
            max-width: 300px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745; /* Changed to green for multiplication */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <h2>Multiply Two Numbers</h2>

    <div class="input-group">
        <label for="num1">First Number:</label>
        <input type="number" id="num1" placeholder="Enter first number">
    </div>

    <div class="input-group">
        <label for="num2">Second Number:</label>
        <input type="number" id="num2" placeholder="Enter second number">
    </div>

    <button onclick="multiplyNumbers()">Multiply</button>

    <div id="result">Result: </div>

    <script>
        function multiplyNumbers() {
            // Get the values from the input fields
            const number1 = parseFloat(document.getElementById('num1').value);
            const number2 = parseFloat(document.getElementById('num2').value);
            
            // Check if the inputs are valid numbers
            if (isNaN(number1) || isNaN(number2)) {
                document.getElementById('result').innerText = "Result: Please enter valid numbers";
                return;
            }
            
            // Perform multiplication using the * operator
            const product = number1 * number2;
            
            // Display the result
            document.getElementById('result').innerText = "Result: " + product;
        }
    </script>

</body>
</html>
